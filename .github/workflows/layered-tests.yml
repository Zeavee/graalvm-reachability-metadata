# Manual fork-friendly smoke test for the cached layered Native Image lane.
name: "Layered tests"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to test"
        required: true
        default: "layered-tests"
      coordinates:
        description: "Coordinates to test"
        required: true
        default: "org.joda:joda-convert:2.2.4"
      java-version:
        description: "GraalVM Java version"
        required: true
        default: "25"
      native-image-mode:
        description: "Native Image mode from ci.json"
        required: true
        default: "current-defaults"

permissions:
  contents: read

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ inputs.ref }}, coordinates = ${{ inputs.coordinates }}, java = ${{ inputs.java-version }}, mode = ${{ inputs.native-image-mode }}"
  cancel-in-progress: true

jobs:
  layered-tests:
    name: "Test ${{ inputs.coordinates }} on ${{ inputs.ref }}"
    runs-on: "ubuntu-latest"
    timeout-minutes: 120
    env:
      GVM_TCK_NATIVE_IMAGE_MODE: ${{ inputs.native-image-mode }}

    steps:
      - name: "Checkout test ref"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      - name: "Setup latest native-build-tools snapshot"
        uses: ./.github/actions/setup-native-build-tools

      - name: "Download GraalVM for layered metadata testing"
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          distribution: "graalvm"
          java-version: ${{ inputs.java-version }}
          set-java-home: "true"
          native-image-job-reports: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Native Image base layer"
        uses: ./.github/actions/setup-native-image-base-layer

      - name: "Pull allowed docker images"
        run: |
          ./gradlew pullAllowedDockerImages -Pcoordinates="${{ inputs.coordinates }}"

      - name: "Check metadata files content"
        run: |
          ./gradlew checkMetadataFiles -Pcoordinates="${{ inputs.coordinates }}"

      - name: "Run layered tests"
        run: |
          set +e
          failure_report="${RUNNER_TEMP}/layered-test-failures.txt"
          ./gradlew testLayered \
            -Pcoordinates="${{ inputs.coordinates }}" \
            -Ptck.layered.continueOnCoordinateFailure=true \
            -Ptck.layered.coordinateFailureReport="${failure_report}" \
            --stacktrace
          result=$?
          set -e

          if [[ -s "${failure_report}" ]]; then
            failure_count="$(wc -l < "${failure_report}" | tr -d ' ')"
            {
              echo "### Layered test failures"
              echo
              echo "Failing libraries: ${failure_count}"
              echo
              while IFS= read -r coordinates; do
                echo "- \`${coordinates}\`"
              done < "${failure_report}"
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "Layered test failures (${failure_count}):"
            sed 's/^/ - /' "${failure_report}"
          fi

          exit "${result}"
